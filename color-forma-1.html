<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>color-forma</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background-color: #e5e3de;

    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    min-height: 100vh;
    padding: 10vh 10vw;
  }
  .container {
    position: relative;
    display: inline-flex;
    justify-content: center;
    align-items: flex-start;
    cursor: pointer;
  }
  /* Spacer holds the container size but is invisible */
  .spacer {
    display: block;
    max-width: 80vw;
    max-height: 80vh;
    width: auto;
    height: auto;
    visibility: hidden;
  }
  /* All real images absolutely positioned over the spacer */
  .container img:not(.spacer) {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    user-select: none;
    -webkit-user-drag: none;
    opacity: 0;
    transition: opacity 0.8s ease-in-out;
  }
  .container img.visible {
    opacity: 1;
  }
</style>
</head>
<body>
<div class="container" id="container">
  <img src="color-forma-1.png" class="spacer" alt="">
  <img src="color-forma-1.png" id="img0" class="visible" alt="color-forma-1">
  <img src="color-forma-2.png" id="img1" alt="color-forma-2">
  <img src="color-forma-3.png" id="img2" alt="color-forma-3">
</div>
<script>
  const imgs = [document.getElementById("img0"), document.getElementById("img1"), document.getElementById("img2")];
  
  let current = 0;

  document.getElementById('container').addEventListener('click', () => {
    imgs[current].classList.remove('visible');
    current = (current + 1) % imgs.length;
    imgs[current].classList.add('visible');
  });
</script>
</body>
</html>
